# OPTIONAL fallback: train on GitHub-hosted runner (no Docker on Azure).
# Primary path: deploy-aca-daily-train.yml → ACA Job runs daily in Azure.
#
# Use this workflow only if ACA Job is not deployed. Otherwise disable schedule below.

name: ai-rag-ml daily train (GitHub runner — optional)

on:
  workflow_dispatch:
  # schedule disabled — daily train runs on Azure Container Apps Job after deploy workflow
  # schedule:
  #   - cron: "15 2 * * *"

env:
  AZURE_STORAGE_ACCOUNT_NAME: airagblob
  AZURE_STORAGE_CONTAINER: logistic
  RISK_CALIBRATION_ID: "00000000-0000-0000-0000-000000000001"

jobs:
  train-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt
      - run: pip install -r requirements.txt
      - name: Train and upload weights to Blob
        env:
          AZURE_SQL_SERVER: ${{ secrets.AZURE_SQL_SERVER }}
          AZURE_SQL_DATABASE: ${{ secrets.AZURE_SQL_DATABASE }}
          AZURE_SQL_USER: ${{ secrets.AZURE_SQL_USER }}
          AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
          AZURE_STORAGE_ACCOUNT_KEY: ${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}
        run: python train.py --daily
