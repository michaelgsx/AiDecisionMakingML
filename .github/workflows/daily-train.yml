# Daily logistic risk train → airagblob / container logistic
# Acts as the "ai-rag-ml" scheduled training job (GitHub-hosted runner).
#
# GitHub → Settings → Secrets and variables → Actions:
#   AZURE_SQL_SERVER, AZURE_SQL_DATABASE, AZURE_SQL_USER, AZURE_SQL_PASSWORD
#   (or AZURE_SQL_CONNECTION_STRING)
#   AZURE_STORAGE_ACCOUNT_NAME  (default airagblob)
#   AZURE_STORAGE_ACCOUNT_KEY   (or AZURE_STORAGE_CONNECTION_STRING)
# Optional: RISK_CALIBRATION_ID

name: ai-rag-ml daily train

on:
  schedule:
    # 02:15 UTC every day
    - cron: "15 2 * * *"
  workflow_dispatch:

env:
  AZURE_STORAGE_ACCOUNT_NAME: airagblob
  AZURE_STORAGE_CONTAINER: logistic
  AZURE_STORAGE_BLOB_PREFIX: models
  RISK_CALIBRATION_ID: "00000000-0000-0000-0000-000000000001"

jobs:
  train-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train and upload weights to Blob
        env:
          AZURE_SQL_SERVER: ${{ secrets.AZURE_SQL_SERVER }}
          AZURE_SQL_DATABASE: ${{ secrets.AZURE_SQL_DATABASE }}
          AZURE_SQL_USER: ${{ secrets.AZURE_SQL_USER }}
          AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
          AZURE_SQL_CONNECTION_STRING: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
          AZURE_STORAGE_ACCOUNT_KEY: ${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
        run: python train.py --daily

      - name: Upload training artifact (workflow run)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: risk-pipeline-${{ github.run_id }}
          path: artifacts/risk_pipeline_latest.json
          if-no-files-found: ignore
