# Deploy ai-rag-ml Docker image to Azure and register a DAILY scheduler on Container Apps.
#
# What this workflow does:
#   1. Build image in ACR (airagacr) — cloud build, no local Docker
#   2. Ensure Container Apps environment exists
#   3. Create/update Container Apps JOB with cron schedule (daily train in Azure)
#   4. Optional smoke test: start one execution
#
# Daily training after deploy is handled by Azure (not GitHub cron).
#
# --- GitHub → Settings → Secrets and variables → Actions ---
#
# Required secret:
#   AZURE_CREDENTIALS          Service principal JSON (same as backend deploy)
#
# Required secrets (unless using Key Vault — see Variables):
#   AZURE_SQL_USER
#   AZURE_SQL_PASSWORD
#   AZURE_STORAGE_ACCOUNT_KEY
#
# Optional secrets (defaults shown):
#   AZURE_SQL_SERVER            ai-rag-sql-server.database.windows.net
#   AZURE_SQL_DATABASE          ai-rag-db-1
#
# Optional variables:
#   USE_KEYVAULT_FOR_ACA_DEPLOY   true | false (default false)
#   AZURE_KEYVAULT_NAME           ai-rag-key
#   KEYVAULT_SQL_PASSWORD_SECRET  azure-sql-password
#   KEYVAULT_STORAGE_KEY_SECRET   airagblob-account-key
#   ACA_CRON_SCHEDULE             15 2 * * *   (02:15 UTC daily)

name: Deploy ai-rag-ml (Docker + daily scheduler)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "requirements.txt"
      - "train.py"
      - "score.py"
      - "src/**"
      - "infra/deploy-aca-daily-train.sh"
      - ".github/workflows/deploy-aca-daily-train.yml"

env:
  ACR_NAME: airagacr
  JOB_NAME: ai-rag-ml-daily-train
  ACA_ENV_NAME: airag-aca-env
  IMAGE_NAME: ai-rag-ml/train:latest
  # Container Apps Job schedule (UTC). Azure runs train.py --daily on this cron.
  ACA_CRON_SCHEDULE: "15 2 * * *"
  AZURE_SQL_SERVER: ai-rag-sql-server.database.windows.net
  AZURE_SQL_DATABASE: ai-rag-db-1
  AZURE_STORAGE_ACCOUNT_NAME: airagblob
  AZURE_STORAGE_CONTAINER: logistic
  RISK_CALIBRATION_ID: "00000000-0000-0000-0000-000000000001"

jobs:
  deploy-docker-and-scheduler:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Add Container Apps CLI extension
        run: az extension add --name containerapp --upgrade --only-show-errors

      - name: Resolve ACR resource group and login server
        id: acr
        run: |
          set -euo pipefail
          az acr show --name "${{ env.ACR_NAME }}" -o none
          RG=$(az acr show --name "${{ env.ACR_NAME }}" --query resourceGroup -o tsv)
          LOC=$(az acr show --name "${{ env.ACR_NAME }}" --query location -o tsv)
          SERVER=$(az acr show --name "${{ env.ACR_NAME }}" --query loginServer -o tsv)
          echo "resource_group=$RG" >> "$GITHUB_OUTPUT"
          echo "location=$LOC" >> "$GITHUB_OUTPUT"
          echo "login_server=$SERVER" >> "$GITHUB_OUTPUT"
          echo "full_image=$SERVER/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image (ACR cloud build)
        run: |
          az acr build \
            --registry "${{ env.ACR_NAME }}" \
            --image "${{ env.IMAGE_NAME }}" \
            --file Dockerfile \
            .

      - name: Ensure Container Apps environment
        run: |
          RG="${{ steps.acr.outputs.resource_group }}"
          LOC="${{ steps.acr.outputs.location }}"
          if ! az containerapp env show --name "${{ env.ACA_ENV_NAME }}" --resource-group "$RG" -o none 2>/dev/null; then
            echo "Creating Container Apps environment ${{ env.ACA_ENV_NAME }} ..."
            az containerapp env create \
              --name "${{ env.ACA_ENV_NAME }}" \
              --resource-group "$RG" \
              --location "$LOC"
          else
            echo "Environment ${{ env.ACA_ENV_NAME }} already exists."
          fi

      - name: Load secrets from Key Vault
        if: vars.USE_KEYVAULT_FOR_ACA_DEPLOY == 'true'
        run: |
          set -euo pipefail
          VAULT="${{ vars.AZURE_KEYVAULT_NAME }}"
          if [ -z "$VAULT" ]; then VAULT="ai-rag-key"; fi
          SQL_SECRET="${{ vars.KEYVAULT_SQL_PASSWORD_SECRET }}"
          if [ -z "$SQL_SECRET" ]; then SQL_SECRET="azure-sql-password"; fi
          BLOB_SECRET="${{ vars.KEYVAULT_STORAGE_KEY_SECRET }}"
          if [ -z "$BLOB_SECRET" ]; then BLOB_SECRET="airagblob-account-key"; fi
          SQL_PW=$(az keyvault secret show --vault-name "$VAULT" --name "$SQL_SECRET" --query value -o tsv)
          BLOB_KEY=$(az keyvault secret show --vault-name "$VAULT" --name "$BLOB_SECRET" --query value -o tsv)
          echo "::add-mask::$SQL_PW"
          echo "::add-mask::$BLOB_KEY"
          echo "AZURE_SQL_PASSWORD=$SQL_PW" >> "$GITHUB_ENV"
          echo "AZURE_STORAGE_ACCOUNT_KEY=$BLOB_KEY" >> "$GITHUB_ENV"

      - name: Validate deployment secrets
        run: |
          if [ -z "${{ secrets.AZURE_SQL_USER }}" ]; then
            echo "Missing secret AZURE_SQL_USER" >&2
            exit 1
          fi
          if [ -z "${AZURE_SQL_PASSWORD:-}" ] && [ -z "${{ secrets.AZURE_SQL_PASSWORD }}" ]; then
            echo "Missing AZURE_SQL_PASSWORD (secret or Key Vault)" >&2
            exit 1
          fi
          if [ -z "${AZURE_STORAGE_ACCOUNT_KEY:-}" ] && [ -z "${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}" ]; then
            echo "Missing AZURE_STORAGE_ACCOUNT_KEY (secret or Key Vault)" >&2
            exit 1
          fi

      - name: Deploy scheduled Container Apps Job
        env:
          RG: ${{ steps.acr.outputs.resource_group }}
          LOGIN_SERVER: ${{ steps.acr.outputs.login_server }}
          FULL_IMAGE: ${{ steps.acr.outputs.full_image }}
          CRON_VAR: ${{ vars.ACA_CRON_SCHEDULE }}
          SQL_PW_GH: ${{ secrets.AZURE_SQL_PASSWORD }}
          BLOB_KEY_GH: ${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}
          SQL_SERVER_GH: ${{ secrets.AZURE_SQL_SERVER }}
          SQL_DB_GH: ${{ secrets.AZURE_SQL_DATABASE }}
        run: |
          set -euo pipefail
          CRON="${CRON_VAR:-${{ env.ACA_CRON_SCHEDULE }}}"
          SQL_PW="${AZURE_SQL_PASSWORD:-$SQL_PW_GH}"
          BLOB_KEY="${AZURE_STORAGE_ACCOUNT_KEY:-$BLOB_KEY_GH}"
          SQL_SERVER="${SQL_SERVER_GH:-${{ env.AZURE_SQL_SERVER }}}"
          SQL_DB="${SQL_DB_GH:-${{ env.AZURE_SQL_DATABASE }}}"

          ACR_USER=$(az acr credential show --name "${{ env.ACR_NAME }}" --query username -o tsv)
          ACR_PASS=$(az acr credential show --name "${{ env.ACR_NAME }}" --query 'passwords[0].value' -o tsv)

          ENV_VARS=(
            "AZURE_SQL_SERVER=$SQL_SERVER"
            "AZURE_SQL_DATABASE=$SQL_DB"
            "AZURE_SQL_USER=${{ secrets.AZURE_SQL_USER }}"
            "AZURE_SQL_PASSWORD=secretref:azure-sql-password"
            "AZURE_STORAGE_ACCOUNT_NAME=${{ env.AZURE_STORAGE_ACCOUNT_NAME }}"
            "AZURE_STORAGE_ACCOUNT_KEY=secretref:azure-storage-account-key"
            "AZURE_STORAGE_CONTAINER=${{ env.AZURE_STORAGE_CONTAINER }}"
            "AZURE_STORAGE_BLOB_PREFIX=models"
            "RISK_CALIBRATION_ID=${{ env.RISK_CALIBRATION_ID }}"
          )

          if az containerapp job show --name "${{ env.JOB_NAME }}" --resource-group "$RG" -o none 2>/dev/null; then
            echo "Updating job ${{ env.JOB_NAME }} (image + schedule + env) ..."
            # job update does not accept --trigger-type, --registry-*, or --secrets (use subcommands)
            az containerapp job update \
              --name "${{ env.JOB_NAME }}" \
              --resource-group "$RG" \
              --image "$FULL_IMAGE" \
              --cron-expression "$CRON" \
              --cpu 0.5 \
              --memory 1.0Gi \
              --replica-timeout 1800 \
              --replica-retry-limit 1 \
              --set-env-vars "${ENV_VARS[@]}"
            az containerapp job registry set \
              --name "${{ env.JOB_NAME }}" \
              --resource-group "$RG" \
              --server "$LOGIN_SERVER" \
              --username "$ACR_USER" \
              --password "$ACR_PASS"
            az containerapp job secret set \
              --name "${{ env.JOB_NAME }}" \
              --resource-group "$RG" \
              --secrets "azure-sql-password=$SQL_PW" "azure-storage-account-key=$BLOB_KEY"
          else
            echo "Creating scheduled job ${{ env.JOB_NAME }} (cron: $CRON) ..."
            az containerapp job create \
              --name "${{ env.JOB_NAME }}" \
              --resource-group "$RG" \
              --environment "${{ env.ACA_ENV_NAME }}" \
              --trigger-type Schedule \
              --cron-expression "$CRON" \
              --replica-timeout 1800 \
              --replica-retry-limit 1 \
              --image "$FULL_IMAGE" \
              --cpu 0.5 \
              --memory 1.0Gi \
              --registry-server "$LOGIN_SERVER" \
              --registry-username "$ACR_USER" \
              --registry-password "$ACR_PASS" \
              --secrets "azure-sql-password=$SQL_PW" "azure-storage-account-key=$BLOB_KEY" \
              --env-vars "${ENV_VARS[@]}"
          fi

      - name: Show scheduler configuration
        run: |
          az containerapp job show \
            --name "${{ env.JOB_NAME }}" \
            --resource-group "${{ steps.acr.outputs.resource_group }}" \
            --query "{
              name: name,
              image: properties.template.containers[0].image,
              trigger: properties.configuration.triggerType,
              cron: properties.configuration.scheduleTriggerConfig.cronExpression,
              state: properties.provisioningState
            }" \
            -o json

      - name: Smoke test — run training once now
        if: github.event_name == 'workflow_dispatch'
        run: |
          az containerapp job start \
            --name "${{ env.JOB_NAME }}" \
            --resource-group "${{ steps.acr.outputs.resource_group }}"
          echo "Started manual execution. Logs:"
          echo "  az containerapp job logs show -n ${{ env.JOB_NAME }} -g ${{ steps.acr.outputs.resource_group }} --follow"

      - name: Azure logout
        if: always()
        run: az logout || true
